<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Portal ENAMI EP</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"><style>:root { --navy: #002d5d; --gold: #b45309; --bg: #f8fafc; } body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; } .main { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; } .header { background: var(--navy); color: white; padding: 20px; text-align: center; } .selector-box { padding: 20px; text-align: center; border-bottom: 1px solid #eee; } select { width: 95%; padding: 12px; border-radius: 8px; border: 2px solid var(--navy); font-weight: 600; cursor: pointer; } .content { padding: 30px; } .card { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #fff; } .asunto-box { background: #fffcf0; border-left: 5px solid var(--gold); padding: 20px; font-weight: 500; color: #1e293b; } .label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; } .badge { background: var(--navy); color: white; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; } .item-list { font-size: 12px; color: #334155; padding: 6px 0; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; } .btn-dl { background: #e2e8f0; color: #475569; text-decoration: none; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; } .btn-dl:hover { background: var(--gold); color: white; }</style></head><body><div class="main"><div class="header"><h2>GESTIÓN DOCUMENTAL ENAMI EP</h2></div><div class="selector-box"><select id="sel" onchange="run()"></select></div><div id="view" class="content"></div></div><script src="data.js"></script><script>const s = document.getElementById('sel'); const ids = Object.keys(db_documentos).sort().reverse(); ids.forEach(id => { let o = document.createElement('option'); o.value = id; o.innerText = id; s.appendChild(o); }); function run() { const d = db_documentos[s.value]; if(!d) return; document.getElementById('view').innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><div><span class="badge">${d.tipo}</span><h3 style="margin:5px 0; color:var(--navy);">${d.id}</h3></div><small style="font-weight:600; color:#64748b;">${d.fecha}</small></div><div class="card asunto-box"><span class="label">Asunto</span>${d.asunto}</div><div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"><div class="card"><span class="label">Para</span>${d.para}</div><div class="card"><span class="label">De</span>${d.de}</div></div><div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"><div class="card"><span class="label">Copias Informativas</span><div style="margin-top:10px;">${d.copias.map(c => `<div class="item-list"><span>${c}</span></div>`).join('')}</div></div><div class="card"><span class="label">Descarga de Anexos</span><div style="margin-top:10px;">${d.anexos.map(a => `<div class="item-list"><span>📎 ${a}</span><a href="anexos/${a}" download="${a}" class="btn-dl">DESCARGAR</a></div>`).join('')}</div></div></div>`; } if(ids.length > 0) run();</script></body></html>
