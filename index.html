
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Portal Documental ENAMI EP</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
        <style>
            :root { --navy: #002d5d; --gold: #b45309; --bg: #f8fafc; }
            body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
            .header { background: var(--navy); color: white; padding: 25px; text-align: center; border-radius: 12px 12px 0 0; }
            .container { max-width: 1000px; margin: auto; background: white; border-radius: 0 0 12px 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
            .selector-box { padding: 20px; background: #fff; border-bottom: 1px solid #e2e8f0; text-align: center; }
            select { width: 80%; padding: 12px; border: 2px solid var(--navy); border-radius: 8px; font-weight: 600; cursor: pointer; }
            .content { padding: 40px; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
            .card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; background: #fff; }
            .full { grid-column: 1 / -1; background: #fffcf0; border-left: 5px solid var(--gold); }
            .label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
            .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
            .MEMORANDO { background: #002d5d; } .OFICIO { background: #27ae60; } .RESOLUCIÓN { background: #e67e22; }
            .copia-item { padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #444; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header"><h1>PORTAL DE CONSULTA ENAMI EP</h1></div>
            <div class="selector-box">
                <label class="label">Seleccione un documento:</label>
                <select id="docSelector" onchange="render()"></select>
            </div>
            <div id="view" class="content"></div>
        </div>
        <script src="data.js"></script>
        <script>
            const sel = document.getElementById('docSelector');
            Object.keys(db_documentos).sort().reverse().forEach(id => {
                let opt = document.createElement('option');
                opt.value = id; opt.innerText = id;
                sel.appendChild(opt);
            });
            function render() {
                const d = db_documentos[sel.value];
                const copias = d.copias.map(c => `<div class="copia-item">${c}</div>`).join('');
                document.getElementById('view').innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <div><span class="badge ${d.tipo}">${d.tipo}</span><h2 style="margin:5px 0; color:#002d5d;">${d.id}</h2></div>
                        <span style="color:#64748b; font-weight:600;">${d.fecha}</span>
                    </div>
                    <div class="card full"><span class="label">Asunto / Resumen</span><div style="font-size:1.15em;">${d.asunto}</div></div>
                    <div class="grid">
                        <div class="card"><span class="label">Para</span>${d.para}</div>
                        <div class="card"><span class="label">De</span>${d.de}</div>
                    </div>
                    <div class="card" style="margin-top:20px;"><span class="label">Copia a</span><div style="display:grid; grid-template-columns:1fr 1fr; gap:0 30px;">${copias || 'N/D'}</div></div>
                `;
            }
            render();
        </script>
    </body>
    </html>
