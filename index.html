
    <!DOCTYPE html>
    <html>
    <head>
        <title>Dashboard ENAMI</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
        <style>
            body { font-family: 'Inter', sans-serif; background: #eef2f5; padding: 40px; color: #1a202c; }
            .container { max-width: 1000px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-top: 6px solid #002d5d; overflow: hidden; }
            .header { background: #002d5d; color: white; padding: 30px; text-align: center; }
            .selector-area { padding: 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: center; gap: 15px; align-items: center; }
            .content { padding: 40px; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
            .box { border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; background: #ffffff; height: 100%; display: flex; flex-direction: column; }
            .label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
            .asunto-card { background: #fffbeb; border: 1px solid #fef3c7; padding: 25px; border-radius: 8px; margin-bottom: 20px; line-height: 1.6; font-size: 1.1em; }
            .copia-line { padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9em; color: #475569; }
            .tag { display: inline-block; background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 9999px; font-size: 12px; margin: 4px; font-weight: 600; }
            select { padding: 10px 20px; border-radius: 6px; border: 1px solid #cbd5e1; min-width: 300px; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header"><h1>ENAMI EP</h1><p>Dashboard de Gestión Documental</p></div>
            <div class="selector-area">
                <label>Seleccione Memorando:</label>
                <select id="memoSelect" onchange="render()"></select>
            </div>
            <div id="view" class="content"></div>
        </div>
        <script>
            const data = {"Memorando Nro. ENAMI-GDM-2026-0059-MEM": {"id": "Memorando Nro. ENAMI-GDM-2026-0059-MEM", "fecha": "Quito, D.M., 11 de marzo de 2026", "para": "<b>Sra. Abg. Gabriela Sibia Jauregui Moran</b><br>Gerente Negocios Mineros", "de": "<b>Mgs. Diego Andr\u00e9s Rueda Albuja</b><br><small>GERENTE DE GESTI\u00d3N Y DESARROLLO MINERO</small>", "asunto": "Consideraci\u00f3n y an\u00e1lisis del Informe T\u00e9cnico No. 79-DAS-2025 - Visita a los Proyectos de la Empresa SILVERCORP (Diciembre 2025)", "copias": ["Sr. Mgs. Galo Andr\u00e9s Garc\u00eda Medina", "Gerente General, Subrogante", "Sr. Mgs. Lenin Vladimir Ochoa Ochoa", "Subgerente Jur\u00eddico", "Sr. Ing. Marlon Oswaldo Lara Mier", "Director Ambiental y Social (E)", "Sr. Ing. Iv\u00e1n Arturo Delgado Quingalombo", "Director T\u00e9cnico de Operaciones Mineras (E)", "Sr. Mgs. William Fernando Mu\u00f1oz Ruiz", "Analista 1 - Social", "Sr. Lcdo. Steven Alexander Guaranda Bazurto", "Asistente Administrativo"], "anexos": []}, "N/D": {"id": "N/D", "fecha": "Quito, D.M., 11 de marzo de 2026", "para": "N/D", "de": "<b>Mgs. Xavier Floresmilo Bola\u00f1os Cuzco</b><br><small>SUBGERENTE DE PLANIFICACI\u00d3N Y GESTI\u00d3N ESTRAT\u00c9GICA</small>", "asunto": "Respuesta a la solicitud de informe t\u00e9cnico para actividades priorizadas - Programa de Gesti\u00f3n Sostenible e Infraestructura Asociada Se\u00f1or Mag\u00edster Jorge Roberto Solano Mera", "copias": ["Se\u00f1ora M\u00e1ster", "Ms. In\u00e9s Mar\u00eda Manzano D\u00edaz", "Ministra de Ambiente y Energ\u00eda", "MINISTERIO DE AMBIENTE Y ENERG\u00cdA", "Se\u00f1or Mag\u00edster", "Guillermo Iv\u00e1n Flores Caama\u00f1o", "Viceministro de Minas", "MINISTERIO DE AMBIENTE Y ENERG\u00cdA", "Se\u00f1or Mag\u00edster", "Galo Andr\u00e9s Garc\u00eda Medina", "Gerente General, Subrogante", "Se\u00f1or Mag\u00edster", "Diego Andr\u00e9s Rueda Albuja", "Gerente de Gesti\u00f3n y Desarrollo Minero", "Se\u00f1or Ingeniero", "Francisco Javier Gudi\u00f1o Lara", "Analista 1 - Procesos"], "anexos": ["implementacion_de_refineria_de_oro_para_enami_ep-signed.pdf", "implementacion_de_planta_de_beneficio_de_minerales_para_la_enami_ep-signed.pdf"]}, "Memorando Nro. ENAMI-SPGE-2026-0033-MEM": {"id": "Memorando Nro. ENAMI-SPGE-2026-0033-MEM", "fecha": "Quito, D.M., 12 de marzo de 2026", "para": "<b>Sr. Mgs. Galo Andr\u00e9s Garc\u00eda Medina</b><br>Gerente General, Subrogante", "de": "<b>Empresa Nacional Minera</b><br><small></small>", "asunto": "Solicitud de Aprobaci\u00f3n de Modificaci\u00f3n POA - Gerencia Gesti\u00f3n y Desarrollo Minero - Direcci\u00f3n T\u00e9cnica de Operaciones Mineras", "copias": ["Sr. Mgs. Diego Andr\u00e9s Rueda Albuja", "Gerente de Gesti\u00f3n y Desarrollo Minero", "Sra. Mgs. Viviana del Carmen Almeida Moreno", "Subgerente Administrativa Financiera", "Sr. Ing. Francisco Javier Gudi\u00f1o Lara", "Analista 1 - Procesos"], "anexos": ["enami-gdm-2026-0058-mem-pedido-ggdm.pdf", "for-ase-gpl-pla-03-01_viabilidad_modificaciones_poa_ggdm_dtom-signed.pdf", "modificaciones_poa_dtom_febrero-signed.pdf", "poa_2026_vc_005_vi_001_12_03_2026.xls"]}, "Memorando Nro. ENAMI-GDM-2026-0060-MEM": {"id": "Memorando Nro. ENAMI-GDM-2026-0060-MEM", "fecha": "Quito, D.M., 13 de marzo de 2026", "para": "<b>Sr. Mgs. Galo Andr\u00e9s Garc\u00eda Medina</b><br>Gerente General, Subrogante", "de": "<b>Mgs. Diego Andr\u00e9s Rueda Albuja</b><br><small>GERENTE DE GESTI\u00d3N Y DESARROLLO MINERO</small>", "asunto": "Remisi\u00f3n de informes de la comisi\u00f3n de servicios ENAMI-ITC-GDM-DTOM-2026-008", "copias": ["Sra. Soc. Jessica Jacqueline Macas Machuca", "Analista 1 - Social", "Sr. Lcdo. Steven Alexander Guaranda Bazurto", "Asistente Administrativo"], "anexos": []}};
            const select = document.getElementById('memoSelect');
            Object.keys(data).sort().forEach(id => {
                let opt = document.createElement('option');
                opt.value = id; opt.innerHTML = id;
                select.appendChild(opt);
            });
            function render() {
                const d = data[select.value];
                const anexos = d.anexos.map(a => `<span class="tag">📎 ${a}</span>`).join('') || 'Ninguno';
                const copias = d.copias.map(c => `<div class="copia-line">${c}</div>`).join('') || 'N/D';
                document.getElementById('view').innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:25px; align-items: baseline;">
                        <h2 style="color:#002d5d; margin:0;">${d.id}</h2>
                        <b style="color:#94a3b8;">${d.fecha}</b>
                    </div>
                    <div class="asunto-card"><span class="label" style="color:#b45309">Asunto</span><br>${d.asunto}</div>
                    <div class="grid">
                        <div class="box"><span class="label">Para</span>${d.para}</div>
                        <div class="box"><span class="label">De</span>${d.de}</div>
                    </div>
                    <div class="grid">
                        <div class="box"><span class="label">Anexos</span><div>${anexos}</div></div>
                        <div class="box"><span class="label">Copia a</span><div>${copias}</div></div>
                    </div>
                `;
            }
            render();
        </script>
    </body>
    </html>
